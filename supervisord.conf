[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
logfile_maxbytes=10MB
logfile_backups=3
loglevel=info
pidfile=/var/run/supervisord.pid

; -----------------------------------------------------------------------
; auth-service — listens on port 8080
; -----------------------------------------------------------------------
[program:auth-service]
command=java -jar /app/auth-service.jar
autostart=true
autorestart=true
startretries=5
startsecs=10
stdout_logfile=/var/log/supervisor/auth-service.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
stderr_logfile=/var/log/supervisor/auth-service-error.log
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=3
environment=SERVER_PORT="8080"
priority=100

; -----------------------------------------------------------------------
; wallet-service — listens on port 8081
; auth-service calls this service; within the same container it is
; reachable at localhost:8081 (override WALLET_SERVICE_URL if needed).
; -----------------------------------------------------------------------
[program:wallet-service]
command=java -jar /app/wallet-service.jar
autostart=true
autorestart=true
startretries=5
startsecs=10
stdout_logfile=/var/log/supervisor/wallet-service.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
stderr_logfile=/var/log/supervisor/wallet-service-error.log
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=3
environment=SERVER_PORT="8081"
priority=100

; -----------------------------------------------------------------------
; trade-service — listens on port 8082
; Connects to Kafka and calls wallet-service; within the same container
; wallet-service is reachable at localhost:8081.
; -----------------------------------------------------------------------
[program:trade-service]
command=java -jar /app/trade-service.jar
autostart=true
autorestart=true
startretries=5
startsecs=10
stdout_logfile=/var/log/supervisor/trade-service.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
stderr_logfile=/var/log/supervisor/trade-service-error.log
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=3
environment=SERVER_PORT="8082"
priority=100
